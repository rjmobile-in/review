      "I am completely satisfied with my purchase at RJ Mobile. Beautiful luxurious store, polite behavior from the sales team, and great free gifts.",
      "RJ Mobile offers a top-tier premium vibe. Luxurious showroom setup, customer-first behavior from staff, and beautiful free gifts with the phone.",
      "Wonderful treatment at RJ Mobile. The showroom design is incredibly luxurious, staff behavior is elite, and they offer high-quality free gifts.",
      "RJ Mobile is simply magnificent. An incredibly luxurious smartphone destination, warm staff behavior, and excellent free gifts with every buy."
    ];

    let selectedBranchName = '';
    let selectedBranchLink = '';
    let generatedText      = '';
    let lastIndex          = -1;

    function selectBranch(el) {
      document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      selectedBranchName = el.dataset.branch;
      selectedBranchLink = el.dataset.link;
    }

    function pickReview() {
      let idx;
      do { idx = Math.floor(Math.random() * REVIEWS.length); } while (idx === lastIndex);
      lastIndex = idx;
      return REVIEWS[idx];
    }

    async function generateReview() {
      if (!selectedBranchName) { showToast('Please select a branch first'); return; }
      clearOutput();
      const text = pickReview();
      generatedText = text;
      await showReview(text);
      document.getElementById('btn-label').textContent = 'Regenerate Review';
    }

    async function showReview(text) {
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('branch-tag-text').textContent = selectedBranchName.replace('RJ Mobile – ', '');
      const box    = document.getElementById('review-box');
      const textEl = document.getElementById('review-text');
      box.classList.add('visible');
      textEl.innerHTML = '';
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      textEl.appendChild(cursor);
      for (let i = 0; i < text.length; i++) {
        textEl.insertBefore(document.createTextNode(text[i]), cursor);
        await wait(text[i] === '.' || text[i] === ',' ? 28 : 12);
      }
      cursor.remove();
      document.getElementById('action-row').classList.add('visible');
    }

    function copyReview() {
      if (!generatedText) return;
      const doSuccess = () => {
        const btn   = document.getElementById('copy-btn');
        const label = document.getElementById('copy-label');
        btn.classList.add('copied');
        label.textContent = '✓ Copied!';
        showToast('Copied to clipboard');
        setTimeout(() => { btn.classList.remove('copied'); label.textContent = 'Copy Text'; }, 2500);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(generatedText).then(doSuccess).catch(() => fallbackCopy(doSuccess));
      } else { fallbackCopy(doSuccess); }
    }

    function fallbackCopy(onSuccess) {
      try {
        const ta = document.createElement('textarea');
        ta.value = generatedText;
        ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        if (ok) onSuccess(); else showToast('Copy failed — please copy manually');
      } catch (e) { showToast('Copy failed — please copy manually'); }
    }

    function openLink() {
      if (!selectedBranchLink) { showToast('Select a branch first'); return; }
      window.open(selectedBranchLink, '_blank', 'noopener,noreferrer');
    }

    function clearOutput() {
      document.getElementById('review-box').classList.remove('visible');
      document.getElementById('review-text').innerHTML = '';
      document.getElementById('action-row').classList.remove('visible');
      document.getElementById('empty-state').style.display = 'none';
    }

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
    }

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
  </script>
</body>
</html>
